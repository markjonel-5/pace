<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="cart.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="cart-page-container reveal">

    </div>
