<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="contact-us.css">
    <link rel="stylesheet" href="size-guide.css">
    <link rel="stylesheet" href="homepage.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="contact-page-container reveal">

        <div class="sg-header-wrapper">
            <h2>CONTACT US</h2>
            <p>Find your perfect fit. Whether it's a sizing question or a style tip, our team is ready to help you step
                up your game.</p>
        </div>

        <div class="contact-main-panel">

            <div class="contact-image-col">
                <img src="Contact Image/contact shoe.jpg" alt="PACE Sneakers">
            </div>

            <div class="contact-form-col">

                <div class="contact-info-row">
                    <div class="info-block">
                        <h4>VISIT US</h4>
                        <p>123 PACE Store, Iba, Hagonoy, Bulacan</p>
                    </div>
                    <div class="info-block">
                        <h4>EMAIL US</h4>
                        <p>pace.store.admin@gmail.com</p>
                    </div>
                </div>

                <form id="store-contact-form">
                    <div class="input-group">
                        <input type="text" id="contact-subject" placeholder="Subject" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="contact-email" placeholder="Your Email" required>
                    </div>
                    <div class="input-group">
                        <textarea id="contact-message" placeholder="How can we help?" rows="7" required></textarea>
                    </div>
                    <button type="submit" class="contact-submit-btn">SEND MESSAGE</button>
                </form>

            </div>
        </div>
    </div>

    <dialog id="email-success-modal" class="account-dialog confirm-dialog">
        <div class="confirm-modal-content">
            <div class="confirm-icon" style="color: #1b8f50;">
                <i class="fi fi-rs-check-circle"></i>
            </div>
            <h3 style="font-size: 22px; color: var(--darkgray-text); margin-bottom: 10px;">Message Sent!</h3>
            <p style="font-size: 14px; color: var(--gray-text); margin-bottom: 25px; text-align: center;">Thank you for
                reaching out. Our team will get back to you soon.</p>
            <div class="confirm-actions" style="justify-content: center; width: 100%;">
                <button class="btn-confirm" style="background-color: #1b8f50; border-color: #1b8f50; flex: 1;"
                    onclick="document.getElementById('email-success-modal').close()">OK</button>
            </div>
        </div>
    </dialog>

    <div id="footer-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contactForm = document.getElementById('store-contact-form');

            if (contactForm) {
                contactForm.addEventListener('submit', function (e) {
                    e.preventDefault();

                    // Find the submit button and freeze it
                    const submitBtn = contactForm.querySelector('.contact-submit-btn');
                    const originalText = submitBtn.innerText;
                    submitBtn.innerText = "SENDING...";
                    submitBtn.style.pointerEvents = "none";

                    const subject = document.getElementById('contact-subject').value.trim();
                    const email = document.getElementById('contact-email').value.trim();
                    const message = document.getElementById('contact-message').value.trim();

                    // Send to live PHP email script
                    fetch('Database/send-email.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ subject: subject, email: email, message: message })
                    })
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                // Trigger the modal instead of the alert
                                const modal = document.getElementById('email-success-modal');
                                if (modal) modal.showModal();
                                contactForm.reset();
                            } else {
                                alert("Error: " + data.message);
                            }
                            // Unfreeze the button
                            submitBtn.innerText = originalText;
                            submitBtn.style.pointerEvents = "auto";
                        })
                        .catch(err => {
                            console.error(err);
                            alert("Server error. Please try again later.");
                            submitBtn.innerText = originalText;
                            submitBtn.style.pointerEvents = "auto";
                        });
                });
            }
        });
    </script>
    <script src="global.js"></script>
</body>

</html>
