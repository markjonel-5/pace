<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="authentication.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="auth-section reveal">
        <div class="forgot-card">

            <div class="forgot-icons"><i class="fi fi-rr-envelope"></i></div>

            <h1 class="auth-title">Forgot Password?</h1>
            <p class="auth-subtitle">Enter your email and we'll send you a code.</p>

            <form id="forgot-form" action="verify-code.html">
                <div>
                    <input type="email" id="forgot-email" class="input-field" placeholder="Enter your email" required>
                    <p class="field-error-msg" id="forgot-email-error"></p>
                </div>
                <button type="submit" class="auth-btn">SEND CODE</button>
            </form>

            <a href="login.html" class="back-link">Back to Login</a>

        </div>
    </div>

    <div id="footer-container"></div>

    <script src="global.js"></script>
    <script src="authentication.js"></script>
</body>

</html>
