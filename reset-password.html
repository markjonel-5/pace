<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="authentication.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="auth-section reveal">
        <div class="forgot-card">

            <div class="forgot-icons"><i class="fi fi-rr-lock"></i></div>

            <h1 class="auth-title">New Password</h1>
            <p class="auth-subtitle">Create a new password for your account.</p>

            <form id="reset-form" action="login.html">
                
                <div class="password-wrapper">
                    <input type="password" id="reset-new-password" class="input-field" placeholder="New Password" required>
                    <i class="fi fi-rr-eye-crossed toggle-password" data-target="reset-new-password"></i>
                </div>
                <p id="reset-password-helper" class="helper-text" style="text-align: left;">Passwords must be at least 8 characters and
                    include uppercase, lowercase, numbers, and symbols (e.g., @, #, $, %).</p>

                <div class="password-wrapper">
                    <input type="password" id="reset-confirm-password" class="input-field" placeholder="Confirm New Password" required>
                    <i class="fi fi-rr-eye-crossed toggle-password" data-target="reset-confirm-password"></i>
                </div>
                <p class="field-error-msg" id="reset-confirm-password-error"></p>

                <button type="submit" class="auth-btn">RESET PASSWORD</button>
            </form>

            <a href="login.html" class="back-link">Cancel</a>

        </div>
    </div>

    <dialog id="reset-success-modal" class="signup-success-container">
        <div class="signup-success-header">
            <i class="fi fi-rs-check-circle"></i>
            <h4>Password Reset!</h4>
        </div>

        <p class="signup-success-text">Success!<br>Your password has been updated securely.<br>You can now log in to your account.</p>

        <div class="signup-success-actions">
            <a href="login.html" class="signup-success-btn-login">PROCEED TO LOGIN</a>
        </div>
    </dialog>

    <div id="footer-container"></div>

    <script src="global.js"></script>
    <script src="authentication.js"></script>
</body>

</html>
