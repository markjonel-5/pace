<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="shop.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="all-category reveal">
        <div class="all-wrapper">
            <a href="men.html" class="all-card"><img src="Category Image/Men Category.jpg" alt="Men">
                <div class="all-title">
                    <h3>MEN</h3>
                </div>
            </a>

            <a href="women.html" class="all-card"><img src="Category Image/Women Category.jpg" alt="Women">
                <div class="all-title">
                    <h3>WOMEN</h3>
                </div>
            </a>

            <a href="kids.html" class="all-card"><img src="Category Image/Kid Category.jpg" alt="Kids">
                <div class="all-title">
                    <h3>KIDS</h3>
                </div>
            </a>
        </div>
    </div>

    <div class="product-header-wrapper reveal">

        <div class="product-header">
            <h1>All Shoes <span>(36)</span></h1>
        </div>

        <div class="sort-dropdown">
            <button class="sort-btn">Sort by <i class="fi fi-rr-angle-small-down"></i></button>

            <div class="sort-menu">
                <button onclick="sortProducts('new')">New Arrivals</button>
                <button onclick="sortProducts('low-high')">Price: Low to High</button>
                <button onclick="sortProducts('high-low')">Price: High to Low</button>
            </div>
        </div>
    </div>

    <div class="product-section reveal" id="product-container"></div>

    <div class="load-more-section">
        <p id="load-count"></p>
        <button id="load-btn" class="load-btn" onclick="loadMore()">LOAD MORE</button>
    </div>

    <div id="footer-container"></div>

    <script src="global.js"></script>
    <script src="shop.js"></script>
</body>

</html>
