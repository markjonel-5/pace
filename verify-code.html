<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="authentication.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="auth-section reveal">
        <div class="forgot-card">

            <div class="forgot-icons"><i class="fi fi-rr-shield-check"></i></div>

            <h1 class="auth-title">Enter Code</h1>
            <p class="auth-subtitle">We sent a code to your email. Enter it below.</p>

            <form id="verify-form">
                <div class="otp-input-group">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autofocus>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                </div>
                
                <p id="verify-error-msg" class="field-error-msg" style="text-align: center; margin-top: -10px; margin-bottom: 15px; display: none;">The code you entered is incorrect.</p>

                <button type="submit" id="verify-btn" class="auth-btn">VERIFY</button>
            </form>

            <div class="resend-container">
                <p id="timer-text">Resend code in <span id="resend-timer">30</span>s</p>
                <p id="resend-text" style="display:none;"><a href="#" id="resend-code-btn">Resend Code</a></p>
            </div>

        </div>
    </div>

    <dialog id="signup-success-modal" class="signup-success-container">
        <div class="signup-success-header">
            <i class="fi fi-rs-check-circle"></i>
            <h4>Account Created!</h4>
        </div>

        <p class="signup-success-text">Welcome to PACE.<br>Your account has been set up successfully.<br>You can now log
            in to start shopping.</p>

        <div class="signup-success-actions">
            <a href="login.html" class="signup-success-btn-login">PROCEED TO LOGIN</a>
        </div>
    </dialog>

    <div id="footer-container"></div>

    <script src="global.js"></script>
    <script src="authentication.js"></script>
</body>

</html>
