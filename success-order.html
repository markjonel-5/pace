<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="success-order.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="success-page-container reveal">
        <div class="success-card">
            <div class="success-icon-wrapper">
                <i class="fi fi-rs-check-circle"></i>
            </div>

            <h1>Order Confirmed!</h1>
            <p class="success-subtitle">Thank you for shopping with PACE. We're getting your order ready.</p>

            <div class="order-number-box">
                <span>Order Number:</span>
                <h3 id="display-order-id">PACE-XXXXXX</h3>
            </div>

            <p class="email-notice">We've sent a confirmation email with your order details.</p>
            <div class="success-actions">
                <a href="order-history.html" id="history-btn" class="btn-secondary">VIEW ORDER HISTORY</a>
                <a href="homepage.html" class="btn-primary">CONTINUE SHOPPING</a>
            </div>
        </div>
    </div>

    <div id="footer-container" class="reveal"></div>

    <script src="global.js"></script>
    <script src="success-order.js"></script>
</body>

</html>
